<!DOCTYPE html>
<html>
<head>
  <title>Google Canvas</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: rgb(195, 191, 191);
      padding: 40px;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.8;
    }

    a {
      color: #a78bfa;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    * { cursor: none; }

    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
    }

    .cursor-f {
      position: fixed;
      width: 30px;
      height: 30px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
    }

    .cursor.hidden, .cursor-f.hidden { opacity: 0; }
    .cursor.clicked { transform: scale(0.7); }

    main { display: none; }
  </style>
</head>
<body>

  <div id="app"></div>

  <h1 id="heading"Dustygames official website.</h1>

  <p id="intro">Welcome to dustygames! Note: This website is hidden. Enjoy! Share this with your friends. </p>

  <h4>I love small heading!</h4>

    <i>hello world!</i>

  <main>
    <div class="bg">
      <div class="bg-main">
        <div class="bg-main-img"></div>
      </div>
      <div class="bg-circle-wrapper">
        <div class="bg-circle">
          <div class="bg-circle-img"></div>
        </div>
      </div>
    </div>
    <div class="btns">
      <button class="arrow prev" onclick="go('prev')"></button>
      <button class="arrow next" onclick="go('next')"></button>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
