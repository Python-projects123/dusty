<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 8px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 9px;
    }

    h3 {
      margin: 0;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <h3>reset</h3>

  <script>
    let lastKey = '';
    document.addEventListener('keydown', function(e) {
      if (e.key === 'e' && lastKey === 'e') {
        window.location.href = 'https://python-projects123.github.io/dusty/nts';
      }
      lastKey = e.key;
    });
  </script>
</body>
</html>
